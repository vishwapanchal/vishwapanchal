<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="50%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.5"/>
      <stop offset="25%" stop-color="#00D9FF" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#7B61FF" stop-opacity="0.3"/>
      <stop offset="75%" stop-color="#00D9FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="holo-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF0080" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#FF8C00" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#00FF88" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#00D9FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.07"/>
      <stop offset="55%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    @keyframes shimmer { 0%{transform:translateX(-300px) rotate(25deg)} 100%{transform:translateX(1000px) rotate(25deg)} }
    @keyframes holo { 0%,100%{opacity:.25} 50%{opacity:.55} }
    @keyframes pulse-dot { 0%,100%{r:4;opacity:.6} 50%{r:5.5;opacity:1} }
    @keyframes scan { 0%{transform:translateY(-20px);opacity:0} 10%,90%{opacity:.12} 100%{transform:translateY(440px);opacity:0} }
    @keyframes particle { 0%{transform:translateY(0);opacity:0} 15%{opacity:.7} 85%{opacity:.7} 100%{transform:translateY(-420px);opacity:0} }
    .shimmer{animation:shimmer 4.5s ease-in-out infinite}
    .holo{animation:holo 3.5s ease-in-out infinite}
    .dot{animation:pulse-dot 2s ease-in-out infinite}
    .scan{animation:scan 5s linear infinite}
    .p{animation:particle 6s linear infinite}
    .lbl{font:700 9px/1 'Courier New',monospace;fill:#00D9FF;letter-spacing:2px}
    .val{font:600 14px/1 'Segoe UI',Helvetica,Arial,sans-serif;fill:#e6e6e6}
    .val-s{font:500 12px/1 'Segoe UI',sans-serif;fill:#8b949e}
    .mono{font:10px/1 'Courier New',monospace;fill:#555}
    .tag{font:600 10px/1 'Segoe UI',sans-serif}
  </style>

  <!-- Shadow -->
  <rect x="6" y="6" width="688" height="408" rx="18" fill="#000" opacity=".25" filter="url(#shadow)"/>

  <!-- ══ CARD BODY ══ -->
  <rect width="700" height="420" rx="16" fill="url(#card-bg)"/>
  <rect x=".5" y=".5" width="699" height="419" rx="16" fill="none" stroke="url(#border-grad)" stroke-width="1.5"/>
  <rect x="3" y="3" width="694" height="414" rx="14" fill="none" stroke="#fff" stroke-opacity=".03"/>

  <!-- Scan line -->
  <rect class="scan" x="0" y="0" width="700" height="1.5" rx="1" fill="#00D9FF"/>

  <!-- ══ TOP BAR ══ -->
  <rect width="700" height="48" rx="16" fill="#00D9FF" fill-opacity=".04"/>
  <rect y="36" width="700" height="12" fill="#00D9FF" fill-opacity=".04"/>
  <text x="24" y="31" font-family="'Segoe UI',sans-serif" font-weight="800" font-size="11" fill="#00D9FF" letter-spacing="4">DEVELOPER LICENSE</text>
  <rect x="565" y="13" width="105" height="22" rx="11" fill="#00D9FF" fill-opacity=".1" stroke="#00D9FF" stroke-opacity=".3" stroke-width=".6"/>
  <text x="617" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" font-weight="700" fill="#00D9FF" letter-spacing="1.5">CLOUD &amp; BE</text>
  <circle class="dot" cx="548" cy="24" r="4" fill="#00FF88" filter="url(#glow)"/>
  <text x="534" y="28" text-anchor="end" font-family="'Courier New',monospace" font-size="8" fill="#00FF88" letter-spacing="1">ACTIVE</text>
  <line x1="20" y1="48" x2="680" y2="48" stroke="#00D9FF" stroke-opacity=".1"/>

  <!-- ══ PHOTO ══ -->
  <rect x="24" y="68" width="100" height="115" rx="8" fill="#080c14" stroke="#00D9FF" stroke-opacity=".2" stroke-width=".8"/>
  <rect x="25" y="69" width="98" height="36" rx="7" fill="#00D9FF" fill-opacity=".03"/>
  <text x="74" y="138" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="800" font-size="30" fill="#00D9FF" filter="url(#glow)">VP</text>
  <text x="74" y="158" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#8b949e">@vishwa</text>
  <!-- Photo corners -->
  <g stroke="#00D9FF" stroke-width="1.2" opacity=".35">
    <line x1="27" y1="73" x2="27" y2="83"/><line x1="27" y1="73" x2="37" y2="73"/>
    <line x1="121" y1="73" x2="121" y2="83"/><line x1="121" y1="73" x2="111" y2="73"/>
    <line x1="27" y1="178" x2="27" y2="168"/><line x1="27" y1="178" x2="37" y2="178"/>
    <line x1="121" y1="178" x2="121" y2="168"/><line x1="121" y1="178" x2="111" y2="178"/>
