  <text x="78" y="322" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="11" fill="#FF9900" letter-spacing="1.5">AWS CERTIFIED</text>
  <text x="78" y="342" font-family="'Segoe UI',sans-serif" font-weight="600" font-size="14" fill="#FFB347">Solutions Architect — Associate</text>
  <text x="78" y="360" font-family="'Courier New',monospace" font-size="10" fill="#8b949e">Credential: 108fd17f · Verified ✓</text>

