  <g transform="translate(24,238)">
    <rect x="0" y="0" width="62" height="22" rx="4" fill="#3776AB" fill-opacity=".15" stroke="#3776AB" stroke-opacity=".3" stroke-width=".6"/>
    <text class="tag" x="31" y="15" text-anchor="middle" fill="#5A9BD5">Python</text>
