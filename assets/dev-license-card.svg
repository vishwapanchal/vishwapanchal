    <path d="M0,-14 L11,-8 L11,2 Q11,14 0,18 Q-11,14 -11,2 L-11,-8 Z" fill="#FF9900" fill-opacity=".18"/>
    <path d="M-5,1 L-1,7 L8,-5" fill="none" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
